name: Frontend Build

on:
  pull_request:
    branches: [master]
    paths:
      - "frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        working-directory: frontend
        run: yarn install

      - name: Test
        working-directory: frontend
        run: yarn test

      - name: Build
        working-directory: frontend
        run: yarn build
