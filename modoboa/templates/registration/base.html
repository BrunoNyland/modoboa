<!DOCTYPE html>
{% load i18n static %}
<html lang="{{ LANGUAGE_CODE }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="{% trans 'Secure sign-in to the Modoboa mail platform.' %}" />
    <title>{% trans "Welcome to Modoboa" %}</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="{% static 'css/offline.css' %}" />
    <style>
     /* Editorial dark theme for the auth pages, matching the SPA.
        Using system fonts for privacy and performance. */

     :root {
       --bg: #0a0a0a; --bg-2: #111111; --fg: #f0f0f0; --fg-dim: #a3a3a3;
       --fg-mute: #7a7a7a; --line-2: #404040; --accent: #7c5cff;
       --accent-2: #a594ff; --warn: #ff5b3a;
     }

     body {
       background-color: var(--bg);
       color: var(--fg);
       font-family: 'Space Grotesk', system-ui, sans-serif;
       -webkit-font-smoothing: antialiased;
     }
     .right-column {
       background-color: var(--bg) !important;
       /* Keep the 20px column padding inside the viewport (offline.css uses
          content-box width:100%, which otherwise overflows on mobile). */
       box-sizing: border-box;
     }
     /* Never let the form box exceed the available width on small screens. */
     .login-box { width: 100%; max-width: min(380px, 100%); }
     .login-box, .message-box {
       text-align: left;
     }
     .login-box { max-width: 380px; }
     h2 {
       font-family: 'Space Grotesk', system-ui, sans-serif;
       font-weight: 700;
       font-size: clamp(28px, 4vw, 40px);
       line-height: 1;
       letter-spacing: -0.03em;
       color: var(--fg);
       margin-bottom: 28px;
       text-align: left;
     }
     .eyebrow {
       font-family: 'JetBrains Mono', ui-monospace, monospace;
       font-size: 11px;
       letter-spacing: 0.18em;
       text-transform: uppercase;
       color: var(--fg-dim);
       margin-bottom: 14px;
     }
     .input-group { margin-bottom: 18px; }
     .input-group label {
       font-family: 'JetBrains Mono', ui-monospace, monospace;
       font-size: 11px;
       letter-spacing: 0.12em;
       text-transform: uppercase;
       color: var(--fg-dim);
       margin-bottom: 8px;
     }
     .input-group input {
       width: 100%;
       box-sizing: border-box;
       padding: 12px 14px;
       background-color: var(--bg-2);
       border: 1px solid var(--line-2);
       border-radius: 0;
       color: var(--fg);
       font-size: 15px;
       font-family: 'Space Grotesk', system-ui, sans-serif;
       transition: border-color 0.2s;
     }
     .input-group input::placeholder { color: var(--fg-mute); }
     .input-group input:focus {
       outline: none;
       border-color: var(--accent);
     }
     .input-group.error input { border-color: var(--warn); }
     .error-message { color: var(--warn); }

     .checkbox-group { gap: 10px; }
     .checkbox-group input {
       width: 16px;
       height: 16px;
       accent-color: var(--accent);
     }
     .checkbox-group label {
       font-family: 'JetBrains Mono', ui-monospace, monospace;
       font-size: 12px;
       letter-spacing: 0.06em;
       text-transform: uppercase;
       color: var(--fg-dim);
       margin: 0;
     }

     .btn {
       width: 100%;
       padding: 13px;
       border: none;
       border-radius: 0;
       cursor: pointer;
       font-family: 'JetBrains Mono', ui-monospace, monospace;
       font-size: 13px;
       font-weight: 500;
       letter-spacing: 0.1em;
       text-transform: uppercase;
       background-color: var(--line-2);
       color: var(--fg);
       transition: background-color 0.2s, color 0.2s;
       margin-top: 6px;
     }
     /* Stronger hover contrast for accessibility (was #555 over #404). */
     .btn:hover { background-color: #6e6e6e; color: #ffffff; }
     .btn:disabled { opacity: 0.5; cursor: default; }
     .btn-primary {
       background-color: var(--accent);
       color: #0a0a0a;
     }
     .btn-primary:hover { background-color: var(--accent-2); }

     /* Visible keyboard focus indicator on all interactive elements. */
     .btn:focus-visible,
     .input-group input:focus-visible,
     .footer a:focus-visible,
     .checkbox-group input:focus-visible {
       outline: 2px solid var(--accent-2);
       outline-offset: 2px;
     }

     .footer { margin-top: 24px; }
     .footer a {
       font-family: 'JetBrains Mono', ui-monospace, monospace;
       font-size: 12px;
       letter-spacing: 0.08em;
       text-transform: uppercase;
       color: var(--accent);
       text-decoration: none;
     }
     .footer a:hover { color: var(--accent-2); text-decoration: none; }

     .alert-box {
       background-color: rgba(255, 91, 58, 0.12);
       border: 1px solid var(--warn);
       color: #ffb4a3;
       border-radius: 0;
     }
     .annoucement {
       background-color: var(--bg-2);
       border: 1px solid var(--line-2);
       border-radius: 0;
       color: var(--fg-dim);
     }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <div class="container">
      <main id="main-content" class="column right-column" aria-label="{% trans 'Sign in' %}">
        {% block main_content %}{% endblock %}
        {% block sub_content %}{% endblock %}
      </main>
    </div>
    {% block extra_js %}{% endblock %}
  </body>
</html>
