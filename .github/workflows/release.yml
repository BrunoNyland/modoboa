name: Build & Release wheel

# Builds an installable wheel of this fork (frontend + compiled
# translations bundled) and attaches it to a GitHub Release.
#
# Triggers:
#   - publishing a GitHub Release (web UI) — recommended, one click;
#   - pushing a tag matching v* (git push origin v2.9.1);
#   - manual run (workflow_dispatch) — uploads the wheel as an artifact.
#
# Install on the server with (MySQL extra):
#   <venv>/bin/pip install --upgrade "<url-to-wheel>[mysql]"

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools_scm / version.py need the full history and tags.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Build frontend
        working-directory: frontend
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Compile translations (.mo)
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext
          find modoboa -name '*.po' -print0 | while IFS= read -r -d '' po; do
            msgfmt "$po" -o "${po%.po}.mo"
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modoboa-dist
          path: dist/*

      - name: Publish to GitHub Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
